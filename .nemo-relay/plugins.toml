version = 1

[[components]]
kind = "observability"
enabled = true

[components.config]
version = 1

[components.config.atof]
enabled = true
output_directory = "logs"
filename = "events.jsonl"
mode = "overwrite"

# Add OpenTelemetry
[components.config.opentelemetry]
enabled = true
transport = "http_binary"
endpoint = "http://localhost:4318/v1/traces"

service_name = "relay-tutorial"
service_namespace = "tutorial"
service_version = "0.1"

instrumentation_scope = "relay-demo"
timeout_millis = 3000